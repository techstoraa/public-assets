<style>

.ts-profile-meta { flex: 1; min-width: 0; }

/* KPI tiles (dashboard-style stat blocks with icons) */

/* ============================================================

.ts-timeline-row { display: flex; gap: 10px; margin-bottom: 1rem; }

<!-- ============================================================
     SEGMENT 6 / 8 — DASHBOARD MARKUP
     (Structure only. Wrapper class must stay exactly as-is.)
     ============================================================ -->
<div class="ts-master-wrapper">
  <div class="ts-hero">
      <h1>Video <span style="color: #00d9ff;">Analysis</span></h1>
      <p>Analyze specific competitor videos, track their views growth, and extract internal video performance data instantly.</p>
  </div>

  <div class="ts-container">

    <!-- Control panel: mode tabs + URL input + primary action -->
    <div class="ts-control-panel">
      <div class="ts-mode-tabs" role="tablist" aria-label="Analysis mode">
        <button type="button" class="ts-mode-tab ts-mode-tab-active" data-mode="analyze" role="tab" aria-selected="true" onclick="vmtSetMode('analyze')">Analyze</button>
        <button type="button" class="ts-mode-tab" data-mode="compare" role="tab" aria-selected="false" onclick="vmtSetMode('compare')">Compare</button>
      </div>
      <div class="ts-input-row">
        <input type="url" id="vmt-url" class="ts-input" placeholder="https://www.youtube.com/watch?v=..." spellcheck="false" autocomplete="off" />
        <button id="vmt-btn" class="ts-btn" onclick="vmtHandlePrimaryAction()">Analyze</button>
      </div>
    </div>

    <!-- Dashboard output surface -->
    <div id="vmt-out" class="ts-output"></div>

  </div>
</div>

<script>
/* Global copy-to-clipboard helper, used by inline onclick handlers in cards */
window.tsCopyTextData = function(btn, targetId) {
    const txt = document.getElementById(targetId).innerText;
    navigator.clipboard.writeText(txt).then(() => {
        const og = btn.innerText;
        btn.innerText = 'Copied!';
        setTimeout(() => btn.innerText = og, 1500);
    });
};

(function() {

  // ============================================================
  // SEGMENT 7 / 8 — CORE STATE, HELPERS & RENDER FUNCTIONS
  // (Non-network logic: formatting, DOM helpers, markup builders,
  // and the in-memory cache that stops duplicate API calls.)
  // ============================================================

  const DEBUG_MODE = false;
  const API_ENDPOINT = 'https://www.techstora.com/api/v1/youtube/proxy';
  const BEFORE_ENDPOINT = 'https://www.techstora.com/api/v1/youtube/before';
  const COMPARE_ENDPOINT = 'https://www.techstora.com/api/v1/youtube/compare';
  const RECHARGE_URL = 'https://www.techstora.com/my-wallet';

  // --- Session state ---
  let currentUrl = null;
  let activeView = 'after';   // 'after' | 'before'
  let currentMode = 'analyze'; // 'analyze' | 'compare'

  // --- In-memory cache: prevents re-hitting the server when the user
  //     flips Before/After repeatedly on the SAME video. Cleared only
  //     when a genuinely new "Analyze" submission happens. ---
  let afterCache = null;    // { vidId, sn, st, tags }
  let beforeCache = null;   // { vidId, sn, st, tags, captured_at }
  let cachedForUrl = null;  // which url the above caches belong to

  function getUID() {
    try {
      const scripts = document.getElementsByTagName('script');
      for (let s of scripts) {
        const t = s.innerHTML || s.textContent || '';
        if (t.includes('__session_info__') && t.includes('"uid"')) {
          const m = t.match(/"uid"\s*:\s*(\d+)/);
          if (m && m[1]) return m[1];
        }
      }
    } catch(e) {}
    return 'unknown_uid';
  }

  function fmtNum(n) {
    if (n == null) return '—';
    const x = Number(n);
    if (x >= 1e9) return (x / 1e9).toFixed(1) + 'B';
    if (x >= 1e6) return (x / 1e6).toFixed(1) + 'M';
    if (x >= 1e3) return (x / 1e3).toFixed(1) + 'K';
    return x.toLocaleString();
  }

  function fmtDate(iso) {
    if (!iso) return '';
    try { return new Date(iso).toLocaleString('en-GB', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' }); }
    catch(e) { return ''; }
  }

  function extractYouTubeId(url) {
    const match = url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i);
    return (match && match[1]) ? match[1] : null;
  }

  function setOut(html) {
    document.getElementById('vmt-out').innerHTML = html;
  }

  function setBtn(loading, label) {
    const b = document.getElementById('vmt-btn');
    b.disabled = loading;
    b.textContent = loading ? 'Working...' : (label || 'Analyze');
  }

  function currentModeLabel() {
    return currentMode === 'compare' ? 'Compare' : 'Analyze';
  }

  // Mode tab switcher (replaces the old <select> dropdown entirely)
  window.vmtSetMode = function(mode) {
    currentMode = mode;
    document.querySelectorAll('.ts-mode-tab').forEach(btn => {
      const isActive = btn.dataset.mode === mode;
      btn.classList.toggle('ts-mode-tab-active', isActive);
      btn.setAttribute('aria-selected', isActive ? 'true' : 'false');
    });
    const b = document.getElementById('vmt-btn');
    if (b && !b.disabled) b.textContent = currentModeLabel();
  };

  function thumbUrl(sn, vidId) {
    const t = sn?.thumbnails || {};
    return t.maxres?.url || t.high?.url || t.medium?.url || t.default?.url || `https://i.ytimg.com/vi/${vidId}/hqdefault.jpg`;
  }

  function pctClass(pct) {
    if (pct == null) return 'ts-delta-flat';
    if (pct > 0) return 'ts-delta-up';
    if (pct < 0) return 'ts-delta-down';
    return 'ts-delta-flat';
  }

  function pctLabel(pct) {
    if (pct == null) return '—';
    const sign = pct > 0 ? '+' : '';
    return `${sign}${pct}%`;
  }

  // Bar width for the comparison visualization, capped at 100%
  function pctBarWidth(pct) {
    if (pct == null) return 0;
    return Math.min(100, Math.abs(pct));
  }

  function pctBarClass(pct) {
    if (pct == null) return 'ts-delta-bar-flat';
    if (pct > 0) return 'ts-delta-bar-up';
    if (pct < 0) return 'ts-delta-bar-down';
    return 'ts-delta-bar-flat';
  }

  function renderMetaCard(vidId, sn, st, tags) {
    const tagsHtml = tags.length
      ? `<div class="ts-tag-cluster">${tags.map(t => `<span class="ts-tag-node">${t}</span>`).join('')}</div>`
      : `<span style="font-size: 0.9rem; color: rgba(255,255,255,0.4); font-style: italic;">[NO_TAGS_DETECTED]</span>`;

    return `
      <div class="ts-card ts-profile-card">
          <div class="ts-embed-container">
              <img src="${thumbUrl(sn, vidId)}" alt="${(sn.title || 'Video thumbnail').replace(/"/g,'')}" />
          </div>
          <div class="ts-profile-meta">
              <div id="ts-val-title" class="ts-meta-title">${sn.title || '—'}</div>
              <span class="ts-meta-channel">${sn.channelTitle || '—'}</span>
          </div>
      </div>

      <div class="ts-card">
          <div class="ts-card-header">
              <div class="ts-card-title">Performance Telemetry</div>
          </div>
          <div class="ts-stats-grid">
              <div class="ts-stat-block">
                  <span class="ts-stat-icon">👁</span>
                  <span class="ts-stat-val">${fmtNum(st.viewCount)}</span>
                  <span class="ts-stat-lbl">Views</span>
              </div>
              <div class="ts-stat-block">
                  <span class="ts-stat-icon">❤</span>
                  <span class="ts-stat-val">${fmtNum(st.likeCount)}</span>
                  <span class="ts-stat-lbl">Likes</span>
              </div>
              <div class="ts-stat-block">
                  <span class="ts-stat-icon">💬</span>
                  <span class="ts-stat-val">${fmtNum(st.commentCount)}</span>
                  <span class="ts-stat-lbl">Comments</span>
              </div>
          </div>
      </div>

      <div class="ts-card">
          <div class="ts-card-header">
              <div class="ts-card-title">Content Matrix</div>
              <button class="ts-btn-copy" onclick="tsCopyTextData(this, 'ts-val-desc')">Copy Desc</button>
          </div>
          <div id="ts-val-desc" class="ts-desc-box">${sn.description || 'No descriptive data mapped.'}</div>
      </div>

      <div class="ts-card">
          <div class="ts-card-header">
              <div class="ts-card-title">Optimization Vectors</div>
              <button class="ts-btn-copy" onclick="tsCopyTextData(this, 'ts-val-tags-raw')">Copy All Tags</button>
          </div>
          <div id="ts-val-tags-raw" style="display:none;">${tags.join(', ')}</div>
          ${tagsHtml}
      </div>
    `;
  }

  function renderTimelineRow(vidId) {
    const afterActive = activeView === 'after' ? 'ts-toggle-active' : '';
    const beforeActive = activeView === 'before' ? 'ts-toggle-active' : '';
    return `
      <div class="ts-timeline-row">
        <button class="ts-toggle-btn ${afterActive}" onclick="vmtShowAfter()">After (Latest)</button>
        <button class="ts-toggle-btn ${beforeActive}" onclick="vmtShowBefore('${vidId}')">Before (Previous Snapshot)</button>
      </div>
    `;
  }

  function renderAuthRequired() {
    return `<div class="ts-alert ts-alert-warn">Authorization required to access pipeline.</div><a class="ts-login-link" href="/web/login">Log In</a>`;
  }

  function renderQuotaExhausted(msg) {
    return `<div class="ts-alert ts-alert-warn">🛑 ${msg}</div><a class="ts-recharge-link" href="${RECHARGE_URL}">Recharge Now</a>`;
  }

  // Small "served instantly" badge shown when a panel is painted from
  // local cache instead of hitting the server — useful for debugging too.
  function cacheFlagHtml() {
    return `<div class="ts-cache-flag"><span class="ts-cache-dot"></span>Loaded instantly from this session (no server call)</div>`;
  }


  // ============================================================
  // SEGMENT 8 / 8 — API HANDLERS (Analyze / Before / Compare)
  // (All network calls live here. Cache is checked FIRST in
  // vmtShowAfter/vmtShowBefore before any fetch is attempted.)
  // ============================================================

  window.vmtHandlePrimaryAction = function() {
    if (currentMode === 'compare') {
      vmtRunCompareFlow();
    } else {
      vmtRun(true); // true = this is a fresh user-triggered submission
    }
  };

  // forceRefresh = true  -> always hits the server (used on manual Analyze submit)
  // forceRefresh = false -> serves from afterCache if available (used by vmtShowAfter fallback)
  window.vmtRun = async function(forceRefresh) {
    const url = document.getElementById('vmt-url').value.trim();
    const vidId = extractYouTubeId(url);

    if (!vidId) {
      setOut(`<div class="ts-alert ts-alert-err"><strong>Validation Error:</strong> Enter a valid YouTube video URL format.</div>`);
      return;
    }

    // A fresh "Analyze" submission always invalidates old cached snapshots,
    // since the user may be pointing at a different video (or wants a true refresh).
    if (forceRefresh) {
      afterCache = null;
      beforeCache = null;
      cachedForUrl = null;
    }

    currentUrl = url;
    activeView = 'after';

    setBtn(true);
    setOut(`<div class="ts-loading-row"><div class="ts-spinner"></div><span>Querying API Pipeline...</span></div>`);

    const payload = { tool_type: 'video_meta_tags', target_url: url, uid: getUID() };

    try {
      const res = await fetch(API_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify(payload)
      });
      const raw = await res.text();

      if (!res.ok) {
        if (res.status === 429) {
          let msg = 'Usage limit reached.';
          try { msg = JSON.parse(raw).error || msg; } catch(e) {}
          setBtn(false, currentModeLabel());
          setOut(renderQuotaExhausted(msg));
          return;
        }
        if (res.status === 401) {
          setBtn(false, currentModeLabel());
          setOut(renderAuthRequired());
          return;
        }
        throw new Error(`HTTP_${res.status} | ${raw.substring(0, 800)}`);
      }

      let data;
      try { data = JSON.parse(raw); } catch(e) { throw new Error(`JSON_PARSE_FAILED | ${raw.substring(0, 800)}`); }

      const json = data.youtube_raw_json;
      if (!json || !json.items || json.items.length === 0) {
        setBtn(false, currentModeLabel());
        setOut(`<div class="ts-alert ts-alert-err"><strong>Target Offline:</strong> Video not found or restrictions applied by creator.</div>`);
        return;
      }

      const item = json.items[0];
      const sn = item.snippet || {};
      const st = item.statistics || {};
      const tags = sn.tags || [];

      // Cache this result so flipping back to "After" later costs zero API calls.
      afterCache = { vidId, sn, st, tags };
      cachedForUrl = url;

      setBtn(false, currentModeLabel());
      setOut(`
        <div class="ts-workspace">
          ${renderTimelineRow(vidId)}
          <div id="vmt-panel">${renderMetaCard(vidId, sn, st, tags)}</div>
        </div>
      `);

    } catch(err) {
      setBtn(false, currentModeLabel());
      if (DEBUG_MODE) {
        const dump = JSON.stringify(err, Object.getOwnPropertyNames(err), 2);
        setOut(`<div class="ts-alert ts-alert-err"><strong>RAW FAULT:</strong><hr style="border-color:rgba(200,0,0,0.2);margin:8px 0;"><pre class="ts-diag-pre">${dump}</pre></div>`);
      } else {
        setOut(`<div class="ts-alert ts-alert-err">Pipeline compromised. Check server stability and try again.</div>`);
      }
    }
  };

  // "After" toggle — cache-first. Only calls vmtRun (a real fetch) on a genuine cache miss.
  window.vmtShowAfter = function() {
    if (!currentUrl) return;
    const vidId = extractYouTubeId(currentUrl);
    activeView = 'after';

    if (cachedForUrl === currentUrl && afterCache) {
      const timelineRow = document.querySelector('.ts-timeline-row');
      const panel = document.getElementById('vmt-panel');
      if (timelineRow) timelineRow.outerHTML = renderTimelineRow(vidId);
      if (panel) {
        panel.innerHTML = cacheFlagHtml() + renderMetaCard(afterCache.vidId, afterCache.sn, afterCache.st, afterCache.tags);
      }
      return; // <-- no network call
    }

    // Cache miss (shouldn't normally happen, but fall back safely)
    vmtRun(false);
  };

  // "Before" toggle — cache-first. Fetches BEFORE_ENDPOINT only once per video.
  window.vmtShowBefore = async function(vidId) {
    if (!currentUrl) return;
    activeView = 'before';

    const timelineRow = document.querySelector('.ts-timeline-row');
    const panel = document.getElementById('vmt-panel');
    if (timelineRow) timelineRow.outerHTML = renderTimelineRow(vidId);

    if (cachedForUrl === currentUrl && beforeCache) {
      if (panel) {
        panel.innerHTML = cacheFlagHtml() + `
          <div class="ts-snapshot-date">📅 Captured: ${fmtDate(beforeCache.captured_at)}</div>
          ${renderMetaCard(beforeCache.vidId, beforeCache.sn, beforeCache.st, beforeCache.tags)}
        `;
      }
      return; // <-- no network call
    }

    if (panel) {
      panel.innerHTML = `<div class="ts-loading-row"><div class="ts-spinner"></div><span>Fetching previous snapshot...</span></div>`;
    }

    const payload = { tool_type: 'video_meta_tags', target_url: currentUrl, uid: getUID() };

    try {
      const res = await fetch(BEFORE_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify(payload)
      });
      const raw = await res.text();

      if (!res.ok) {
        if (res.status === 429) {
          let msg = 'Usage limit reached.';
          try { msg = JSON.parse(raw).error || msg; } catch(e) {}
          document.getElementById('vmt-panel').innerHTML = renderQuotaExhausted(msg);
          return;
        }
        if (res.status === 401) {
          document.getElementById('vmt-panel').innerHTML = renderAuthRequired();
          return;
        }
        throw new Error(`HTTP_${res.status} | ${raw.substring(0, 800)}`);
      }

      let data;
      try { data = JSON.parse(raw); } catch(e) { throw new Error(`JSON_PARSE_FAILED | ${raw.substring(0, 800)}`); }

      if (data.status === 'not_indexed' || data.status === 'first_index_today') {
        document.getElementById('vmt-panel').innerHTML = `<div class="ts-alert ts-alert-info">${data.message}</div>`;
        return;
      }

      const json = data.youtube_raw_json;
      const item = json?.items?.[0];
      if (!item) {
        document.getElementById('vmt-panel').innerHTML = `<div class="ts-alert ts-alert-err">Previous snapshot could not be loaded.</div>`;
        return;
      }

      const sn = item.snippet || {};
      const st = item.statistics || {};
      const tags = sn.tags || [];

      // Cache this snapshot so re-toggling to "Before" costs zero API calls.
      beforeCache = { vidId, sn, st, tags, captured_at: data.captured_at };
      cachedForUrl = currentUrl;

      document.getElementById('vmt-panel').innerHTML = `
        <div class="ts-snapshot-date">📅 Captured: ${fmtDate(data.captured_at)}</div>
        ${renderMetaCard(vidId, sn, st, tags)}
      `;

    } catch(err) {
      const panel = document.getElementById('vmt-panel');
      if (panel) {
        if (DEBUG_MODE) {
          const dump = JSON.stringify(err, Object.getOwnPropertyNames(err), 2);
          panel.innerHTML = `<div class="ts-alert ts-alert-err"><strong>RAW FAULT:</strong><hr style="border-color:rgba(200,0,0,0.2);margin:8px 0;"><pre class="ts-diag-pre">${dump}</pre></div>`;
        } else {
          panel.innerHTML = `<div class="ts-alert ts-alert-err">Pipeline compromised. Check server stability and try again.</div>`;
        }
      }
    }
  };

  // Compare flow — unchanged trigger semantics, always a deliberate fresh request.
  window.vmtRunCompareFlow = async function() {
    const url = document.getElementById('vmt-url').value.trim();
    const vidId = extractYouTubeId(url);

    if (!vidId) {
      setOut(`<div class="ts-alert ts-alert-err"><strong>Validation Error:</strong> Enter a valid YouTube video URL format.</div>`);
      return;
    }

    currentUrl = url;

    setBtn(true, 'Compare');
    setOut(`<div class="ts-loading-row"><div class="ts-spinner"></div><span>Calculating comparison...</span></div>`);

    const payload = { tool_type: 'video_meta_tags', target_url: url, uid: getUID() };

    try {
      const res = await fetch(COMPARE_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify(payload)
      });
      const raw = await res.text();

      if (!res.ok) {
        if (res.status === 429) {
          let msg = 'Usage limit reached.';
          try { msg = JSON.parse(raw).error || msg; } catch(e) {}
          setBtn(false, 'Compare');
          setOut(renderQuotaExhausted(msg));
          return;
        }
        if (res.status === 401) {
          setBtn(false, 'Compare');
          setOut(renderAuthRequired());
          return;
        }
        throw new Error(`HTTP_${res.status} | ${raw.substring(0, 800)}`);
      }

      let data;
      try { data = JSON.parse(raw); } catch(e) { throw new Error(`JSON_PARSE_FAILED | ${raw.substring(0, 800)}`); }

      setBtn(false, 'Compare');

      if (data.status !== 'ok') {
        setOut(`<div class="ts-alert ts-alert-info">${data.message || 'Comparison not available yet.'}</div>`);
        return;
      }

      const m = data.comparison?.metrics || {};
      const rows = ['viewCount', 'likeCount', 'commentCount']
        .filter(k => m[k])
        .map(k => {
          const label = k === 'viewCount' ? 'Views' : k === 'likeCount' ? 'Likes' : 'Comments';
          const pct = m[k].percent_change;
          return `
            <div class="ts-delta-row">
              <div class="ts-delta-top">
                <span class="ts-delta-label">${label}</span>
                <span class="ts-delta-vals">${fmtNum(m[k].before)} → ${fmtNum(m[k].after)}
                  <span class="ts-delta-pct ${pctClass(pct)}">${pctLabel(pct)}</span>
                </span>
              </div>
              <div class="ts-delta-bar-track">
                <div class="ts-delta-bar-fill ${pctBarClass(pct)}" style="width:${pctBarWidth(pct)}%"></div>
              </div>
            </div>
          `;
        }).join('');

      setOut(`
        <div class="ts-card">
            <div class="ts-card-header">
                <div class="ts-card-title">Growth Comparison (${data.days_between} days apart)</div>
            </div>
            ${rows}
        </div>
      `);

    } catch(err) {
      setBtn(false, 'Compare');
      if (DEBUG_MODE) {
        const dump = JSON.stringify(err, Object.getOwnPropertyNames(err), 2);
        setOut(`<div class="ts-alert ts-alert-err"><strong>RAW FAULT:</strong><hr style="border-color:rgba(200,0,0,0.2);margin:8px 0;"><pre class="ts-diag-pre">${dump}</pre></div>`);
      } else {
        setOut(`<div class="ts-alert ts-alert-err">Pipeline compromised. Check server stability and try again.</div>`);
      }
    }
  };

})();
</script>
